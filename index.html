<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=VT323&family=Special+Elite&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   VARIANT TOKENS
══════════════════════════════════ */
:root {
  --beige-light:  #F0EDE0;
  --beige-main:   #E0DCCF;
  --beige-dark:   #C4C0B3;
  --screen-black: #222529;
  --accent-blue:  #2B6CB0;
  --accent-orange:#C05621;
  --accent-red:   #8B0000;
  --ink-black:    #0f0f0f;
  --font-display: 'Shrikhand', cursive;
  --font-stamp:   'Special Elite', system-ui;
  --font-mono:    'VT323', monospace;
  --app-bg:       #fdfaf0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--app-bg);
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

/* FIX #1: Full screen coverage using fixed positioning */
.iphone-frame {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%;
  height: 100%;
  background: var(--app-bg);
  overflow: hidden;
}

.notch { display: none; }

/* ══════════════════════════════════
   PAGE SYSTEM — FIX #4: No stamp-enter, pure CSS transitions only
══════════════════════════════════ */
.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  /* FIX #4: Use single transition — no animation class at all */
  transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
  will-change: transform, opacity;
}

/* hidden: off-screen below */
.page.slide-up {
  transform: translateY(100%);
  pointer-events: none;
}

/* hidden: pushed up & faded */
.page.slide-out {
  transform: translateY(-12%);
  opacity: 0;
  pointer-events: none;
}

/* FIX #4: Active state is simply no transform class — default position */
/* No .stamp-enter animation at all; pages simply transition in */

/* stacking order */
#home   { z-index: 1; }
#list   { z-index: 2; }
#edit   { z-index: 3; }
#detail { z-index: 4; }
#trash  { z-index: 5; }

/* ══════════════════════════════════
   HOME PAGE
══════════════════════════════════ */
#home .scroll-container {
  height: 100%;
  overflow: hidden;
  padding: 60px 24px 40px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 40px);
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1.home-title {
  font-family: var(--font-display);
  font-size: 3.8rem;
  line-height: 0.85;
  text-align: center;
  margin-bottom: 2rem;
  color: var(--accent-red);
  text-shadow: 3px 3px 0px #fff, 6px 6px 0px var(--beige-dark);
  transform: rotate(-2deg);
  display: block;
  flex-shrink: 0;
}

.hero-sticker-area {
  position: relative;
  width: 100%;
  height: 380px;
  margin-bottom: 3rem;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
}

.computer-container {
  transform: scale(0.65) translateY(-20px);
  z-index: 5;
  transform-style: preserve-3d;
}

.deco-sticker {
  position: absolute;
  z-index: 6;
  filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.deco-sticker:hover { transform: scale(1.12); }

.sticker-star-lg {
  width: 80px; height: 80px;
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  top: -10px; left: 10px;
  transform: rotate(-15deg);
  background: #FFD700;
}

.sticker-ball-lg {
  width: 70px; height: 70px;
  background: var(--accent-orange);
  border-radius: 50%;
  bottom: 20px; right: 0px;
  border: 4px solid #fff;
  transform: rotate(10deg);
}

.sticker-badge-lg {
  width: 60px; height: 75px;
  background: linear-gradient(180deg,#63B548,#F6C829,#E57D25,#D83335,#9C4595,#468CCF);
  border-radius: 30px 30px 10px 10px;
  bottom: 40px; left: -10px;
  border: 4px solid #fff;
  transform: rotate(-10deg);
}

.sticker-sparkle {
  position: absolute;
  font-size: 40px;
  color: var(--accent-blue);
  top: 20px; right: 20px;
  transform: rotate(20deg);
  z-index: 6;
}

.copy {
  font-family: var(--font-stamp);
  font-size: 1rem;
  line-height: 1.2;
  text-align: center;
  margin: -0.5rem 0 1.1rem;
  color: #333;
  flex-shrink: 0;
}

.btn-stamp {
  display: block;
  width: 100%;
  background: transparent;
  border: 4px solid var(--accent-red);
  color: var(--accent-red);
  font-family: var(--font-stamp);
  font-size: 2rem;
  font-weight: bold;
  text-transform: uppercase;
  padding: 0.8rem;
  text-align: center;
  text-decoration: none;
  margin-top: 0.3rem;
  transform: rotate(1deg);
  position: relative;
  opacity: 0.9;
  box-shadow: inset 0 0 10px rgba(139,0,0,0.1);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, transform 0.1s;
  user-select: none;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.btn-stamp:active {
  background: var(--accent-red);
  color: #fff;
  transform: rotate(1deg) scale(0.97);
}

/* ══════════════════════════════════
   3-D COMPUTER
══════════════════════════════════ */
.computer-unit {
  position: relative;
  width: 360px; height: 440px;
  transform-style: preserve-3d;
  transform: rotateY(-15deg) rotateX(5deg);
}

.face { position: absolute; background: var(--beige-main); border: 1px solid rgba(0,0,0,0.1); }

.front {
  width: 360px; height: 440px;
  transform: translateZ(100px);
  background: linear-gradient(135deg, var(--beige-light), var(--beige-main));
  display: flex; flex-direction: column; align-items: center; padding-top: 40px;
}

.screen-inset {
  width: 280px; height: 220px;
  background: #D1CEC7; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: inset 2px 2px 8px rgba(0,0,0,0.2), inset -2px -2px 8px rgba(255,255,255,0.5);
}

.crt {
  width: 260px; height: 200px;
  background: var(--screen-black);
  border-radius: 40px;
  position: relative; overflow: hidden;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

.crt::before {
  content: '';
  position: absolute; top:0;left:0;right:0;bottom:0;
  background:
    linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
    linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.02), rgba(0,0,255,0.04));
  background-size: 100% 2px, 3px 100%;
  z-index: 5; pointer-events: none; border-radius: 40px;
}

.crt-glow {
  position: absolute; top:10px;left:10px;right:10px;bottom:10px;
  color: #fff;
  font-family: var(--font-mono);
  padding: 15px; font-size: 14px;
  z-index: 2;
  text-shadow: 0 0 3px rgba(255,255,255,0.6);
}

.crt-date {
  font-size: 10px;
  border-bottom: 1px solid #444;
  margin-bottom: 10px;
  padding-bottom: 4px;
  opacity: 0.8;
  letter-spacing: 0.05em;
}

.crt-content { font-size: 12px; line-height: 1.3; }

.crt-cursor {
  display: inline-block;
  width: 8px; height: 12px;
  background: white;
  animation: blink 1s step-end infinite;
  vertical-align: middle;
  margin-left: 2px;
}

.crt-click-hint {
  position: absolute;
  bottom: 10px; right: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em;
  pointer-events: none;
  z-index: 3;
}

.floppy-slot {
  width: 140px; height: 10px;
  background: #333; margin-top: 30px;
  border-radius: 5px; margin-left: 80px;
  box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
}

.comp-sticker { position: absolute; z-index: 5; }
.comp-sticker-ball {
  width: 40px; height: 40px;
  background: var(--accent-orange); border-radius: 50%;
  bottom: 88px; left: 20px;
  transform: translateZ(101px) rotate(-10deg);
}
.comp-sticker-star {
  width: 45px; height: 45px;
  background: #fff; border-radius: 8px;
  bottom: 98px; left: 50px;
  transform: translateZ(102px) rotate(15deg);
  border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
}
.comp-sticker-star::after { content:'★'; color:var(--accent-blue); font-size:24px; }
.comp-sticker-text {
  width: 60px; height: 30px;
  background: var(--accent-red); color: #F0E68C;
  font-family: 'Courier New', monospace;
  font-size: 6px; line-height: 1.3;
  display: flex; align-items: center; justify-content: center;
  text-align: center; font-weight: bold; letter-spacing: 0.5px;
  bottom: 64px; left: 100px;
  transform: translateZ(101px) rotate(-2deg);
  box-shadow: 1px 1px 1px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.2);
}
.comp-logo {
  position: absolute; bottom: 30px; left: 30px;
  width: 20px; height: 26px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: linear-gradient(180deg,#63B548 0%,#63B548 16.6%,#F6C829 16.6%,#F6C829 33.3%,#E57D25 33.3%,#E57D25 50%,#D83335 50%,#D83335 66.6%,#9C4595 66.6%,#9C4595 83.3%,#468CCF 83.3%,#468CCF 100%);
}
.comp-logo::before { content:""; position:absolute; top:-6px;left:50%; transform:translateX(-50%); width:3px;height:7px; background:#5a3e28; border-radius:1px; }

.grill {
  position: absolute; bottom: 25px; right: 25px;
  display: grid; grid-template-columns: repeat(4,1fr); gap:2px; width:30px; height:20px;
}
.vent { background:#333; border-radius:1px; }

.side-right {
  width: 200px; height: 440px;
  transform: rotateY(90deg) translateZ(260px);
  background: var(--beige-dark);
  box-shadow: inset 10px 0 20px rgba(0,0,0,0.1);
}
.top-side {
  width: 360px; height: 200px;
  transform: rotateX(90deg) translateZ(100px);
  background: var(--beige-light);
}
.bottom-side {
  width: 360px; height: 200px;
  transform: rotateX(-90deg) translateZ(340px);
  background: var(--beige-dark);
  box-shadow: 0 50px 80px rgba(0,0,0,0.3);
}
.left-side {
  width: 200px; height: 440px;
  transform: rotateY(-90deg) translateZ(100px);
  background: var(--beige-main);
  box-shadow: inset 10px 0 20px rgba(0,0,0,0.05);
}

.keyboard-assembly {
  position: absolute; width: 360px; height: 140px; bottom: -110px;
  transform: translateZ(160px) rotateX(65deg);
  transform-style: preserve-3d;
  --kb-thickness: 18px;
}
.kb-base {
  position: absolute; width: 100%; height: 100%;
  background: var(--beige-main);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transform: translateZ(calc(var(--kb-thickness)/2));
  overflow: hidden;
}
.kb-front,.kb-back { position:absolute;left:0;width:100%;height:var(--kb-thickness); }
.kb-front { bottom:0; background:linear-gradient(180deg,#cdc9bb,#b5b1a3); transform-origin:bottom center; transform:translateZ(calc(var(--kb-thickness)/2)) rotateX(90deg); }
.kb-back  { top:0;    background:linear-gradient(180deg,#e5e1d4,#c9c5b8); transform-origin:top center;    transform:translateZ(calc(var(--kb-thickness)/2)) rotateX(-90deg); }
.kb-left,.kb-right { position:absolute;top:0;width:var(--kb-thickness);height:100%; background:linear-gradient(180deg,#d1cdbf,#b7b3a6); }
.kb-left  { left:0;  transform-origin:left center;  transform:translateZ(calc(var(--kb-thickness)/2)) rotateY(90deg); }
.kb-right { right:0; transform-origin:right center; transform:translateZ(calc(var(--kb-thickness)/2)) rotateY(-90deg); }

.keys-grid {
  display: grid; grid-template-columns: repeat(12,1fr); gap:6px; padding:15px;
  transform: translateZ(8px);
}
.key {
  height: 25px; background: #ECE8DA; border-radius: 4px;
  box-shadow: 0 4px 0 #C4C0B3;
  transition: transform 0.05s, box-shadow 0.05s;
}
.key.wide  { grid-column: span 2; }
.key.space { grid-column: span 5; }

@keyframes typeKey {
  0%,100% { transform:translateY(0);  box-shadow:0 4px 0 #C4C0B3; }
  50%     { transform:translateY(3px); box-shadow:0 1px 0 #C4C0B3; }
}
.key:nth-child(3n+1) { animation:typeKey 1.5s infinite 0.2s; }
.key:nth-child(7n)   { animation:typeKey 2.1s infinite 0.5s; }
.key:nth-child(2n+4) { animation:typeKey 1.8s infinite 0.9s; }
.key:nth-child(5n)   { animation:typeKey 2.5s infinite 1.2s; }
.key:nth-child(4n+2) { animation:typeKey 1.2s infinite 0s; }

/* ══════════════════════════════════
   EDIT PAGE
══════════════════════════════════ */
#edit {
  background: var(--app-bg);
  background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
  background-size: 24px 24px;
  display: flex;
  flex-direction: column;
}

#edit .scroll-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0;
  display: flex;
  flex-direction: column;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}
#edit .scroll-container::-webkit-scrollbar { display: none; }

.edit-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(env(safe-area-inset-top, 0px) + 12px) 20px 16px;
  border-bottom: 2px solid rgba(139,0,0,0.15);
  flex-shrink: 0;
}

.back-stamp {
  font-family: var(--font-stamp);
  font-size: 1rem;
  color: var(--accent-red);
  background: transparent;
  border: 2px solid var(--accent-red);
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transform: rotate(-1deg);
  transition: background 0.15s, color 0.15s;
}
.back-stamp:active { background: var(--accent-red); color: #fff; }

.edit-date-stamp {
  font-family: var(--font-mono);
  font-size: 18px;
  color: #888;
  letter-spacing: 0.06em;
}

.save-stamp {
  font-family: var(--font-stamp);
  font-size: 1rem;
  background: var(--accent-red);
  color: var(--app-bg);
  border: 2px solid var(--accent-red);
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transform: rotate(1deg);
  transition: opacity 0.15s;
}
.save-stamp:active { opacity: 0.7; }

.entry-wrap { padding: 0 20px; flex: 1; display: flex; flex-direction: column; }

.entry-title-input {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--accent-red);
  background: transparent;
  border: none; outline: none;
  width: 100%;
  padding: 20px 0 8px;
  transform: rotate(-0.5deg);
  -webkit-appearance: none;
  letter-spacing: -0.5px;
}
.entry-title-input::placeholder { color: rgba(139,0,0,0.2); }

.stamp-line {
  width: 100%;
  border: none;
  border-top: 2px dashed rgba(139,0,0,0.2);
  margin: 4px 0 12px;
}

/* FIX #2: Rich editor area replaces plain textarea */
.entry-body-input {
  font-family: var(--font-stamp);
  font-size: 1rem;
  line-height: 1.9;
  color: #333;
  background: transparent;
  border: none; outline: none;
  width: 100%;
  resize: none;
  min-height: 320px;
  -webkit-appearance: none;
}
.entry-body-input::placeholder { color: rgba(0,0,0,0.18); }

/* Rich editor contenteditable */
.rich-editor {
  font-family: var(--font-stamp);
  font-size: 1rem;
  line-height: 1.9;
  color: #333;
  background: transparent;
  border: none; outline: none;
  width: 100%;
  min-height: 320px;
  -webkit-appearance: none;
  word-break: break-word;
  white-space: pre-wrap;
  padding: 0;
}
.rich-editor:empty::before {
  content: attr(data-placeholder);
  color: rgba(0,0,0,0.18);
  pointer-events: none;
}
.rich-editor img {
  display: block;
  max-width: 100%;
  border-radius: 6px;
  margin: 8px 0;
  border: 1px solid rgba(139,0,0,0.12);
}
.rich-editor:focus {
  outline: none;
}

.edit-footer {
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 2px solid rgba(139,0,0,0.12);
  flex-shrink: 0;
  background: var(--app-bg);
}
.word-stamp {
  font-family: var(--font-mono);
  font-size: 16px;
  color: rgba(0,0,0,0.3);
  letter-spacing: 0.08em;
}
.foot-icons { display: flex; gap: 16px; }
.foot-icons button {
  background: none; border: none; cursor: pointer;
  color: rgba(139,0,0,0.4); padding: 0; line-height: 1;
  transition: color 0.15s;
}
.foot-icons button:active { color: var(--accent-red); }

/* Photo strip (thumbnails below editor) */
.photo-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 20px 4px;
  flex-shrink: 0;
}
.photo-strip:empty { display: none; }

.photo-thumb-wrap {
  position: relative;
  width: 80px; height: 80px;
  flex-shrink: 0;
  border: 2px solid rgba(139,0,0,0.2);
  border-radius: 4px;
  overflow: visible;
}
.photo-thumb {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 2px;
  display: block;
}
.photo-del {
  position: absolute;
  top: -8px; right: -8px;
  width: 20px; height: 20px;
  background: var(--accent-red);
  color: #fff;
  border: 2px solid var(--app-bg);
  border-radius: 50%;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
.toast {
  position: absolute; bottom: 60px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink-black); color: var(--app-bg);
  font-family: var(--font-stamp); font-size: 0.9rem;
  padding: 10px 22px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200; white-space: nowrap;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transform-origin: center;
  border: 2px solid var(--ink-black);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) rotate(-1deg); }

/* ══════════════════════════════════
   LIST PAGE
══════════════════════════════════ */
#list {
  background: var(--app-bg);
}
#list .scroll-container {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: calc(env(safe-area-inset-top, 0px) + 24px) 24px 120px;
  -webkit-overflow-scrolling: touch;
}
#list .scroll-container::-webkit-scrollbar { display: none; }

.list-title {
  font-family: 'EB Garamond', serif;
  font-size: 3.5rem;
  line-height: 0.88;
  letter-spacing: -2px;
  font-weight: 500;
  margin-top: 12px;
  margin-bottom: 32px;
  color: var(--ink-black);
}
.list-title em {
  font-style: italic;
  display: block;
}

.entry-card {
  width: 100%;
  background: #1a1c1e;
  border-radius: 22px;
  margin-bottom: 20px;
  border: 7px solid var(--beige-main);
  box-shadow: 0 16px 40px rgba(0,0,0,0.1);
  position: relative;
  cursor: pointer;
  transition: border-color 0.25s;
  overflow: hidden;
}
.entry-card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 55%);
  pointer-events: none;
  border-radius: 14px;
}
.entry-card:hover { border-color: var(--beige-dark); }
.entry-card:active { transform: scale(0.99); }

.entry-card-inner {
  padding: 18px;
  font-family: var(--font-mono);
  color: white;
  font-size: 14px;
  min-height: 190px;
  display: flex;
  flex-direction: column;
}

/* FIX #3: Card meta — ensure delete button doesn't overlap time */
.entry-card-meta {
  opacity: 0.55;
  margin-bottom: 8px;
  letter-spacing: 0.1em;
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-right: 32px; /* make room for delete button */
}

<script>
/* ══════════════════════════════════
   DATE HELPERS
══════════════════════════════════ */
const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_UP  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function nowObj() { return new Date(); }

function fmt(d) {
  return `${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}, ${d.getFullYear()}  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtCardDate(isoStr) {
  const d = new Date(isoStr);
  return `${MONTHS_UP[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}, ${d.getFullYear()}`;
}
function fmtCardTime(isoStr) {
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDetailTs(isoStr) {
  const d = new Date(isoStr);
  return `${d.getFullYear()} · ${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}<br>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function slugTitle(t) {
  if (!t) return 'UNTITLED.txt';
  return t.toUpperCase().replace(/[^A-Z0-9]/g,'_').replace(/_+/g,'_').slice(0,20)+'.txt';
}
function fmtSize(body) {
  return ((body||'').length/1024).toFixed(1)+'KB';
}

document.getElementById('crt-date').textContent =
  `${MONTHS[nowObj().getMonth()]} ${nowObj().getDate()}, ${nowObj().getFullYear()}`;

function refreshHomeCount() {
  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  document.getElementById('entry-count').textContent = all.length;
}
refreshHomeCount();

/* ══════════════════════════════════
   USERNAME
══════════════════════════════════ */
function getUsername() {
  return localStorage.getItem('journal_username') || '';
}
function syncUsernameSizer() {
  const input = document.getElementById('username-input');
  const wrap  = document.getElementById('username-sizer-wrap');
  if (!input || !wrap) return;
  wrap.dataset.value = input.value || input.placeholder;
}
function initUsername() {
  const input = document.getElementById('username-input');
  if (!input) return;
  const saved = getUsername();
  if (saved) input.value = saved;
  syncUsernameSizer();
  input.addEventListener('input', () => {
    localStorage.setItem('journal_username', input.value.trim());
    syncUsernameSizer();
  });
}

/* ══════════════════════════════════
   COMMENTS
══════════════════════════════════ */
let currentEntryKey = null;

function commentStorageKey(entryDate) { return 'journal_comments_' + entryDate; }
function getComments(entryDate) { return JSON.parse(localStorage.getItem(commentStorageKey(entryDate)) || '[]'); }
function saveComments(entryDate, arr) { localStorage.setItem(commentStorageKey(entryDate), JSON.stringify(arr)); }

function fmtCommentTime(isoStr) {
  const d = new Date(isoStr);
  const m = String(d.getMinutes()).padStart(2,'0');
  const h12 = d.getHours() % 12 || 12;
  const ampm = d.getHours() < 12 ? 'AM' : 'PM';
  return `${String(h12).padStart(2,'0')}:${m} ${ampm}`;
}

function renderComments(entryDate) {
  const list = document.getElementById('comment-list');
  if (!list) return;
  const comments = getComments(entryDate);
  if (comments.length === 0) {
    list.innerHTML = `<div class="comment-empty">NO COMMENTS YET.<br>BE THE FIRST TO WRITE.</div>`;
    return;
  }
  list.innerHTML = comments.map((c, i) => `
    <div class="comment-card">
      <div class="comment-card-header">
        <span class="comment-author">${escapeHtml(c.author)}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="comment-time">${fmtCommentTime(c.date)}</span>
          <button class="comment-del-btn" onclick="deleteComment(${i})" title="删除">×</button>
        </div>
      </div>
      <p class="comment-text">${escapeHtml(c.text)}</p>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function postComment() {
  if (!currentEntryKey) return;
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const author = getUsername() || 'anonymous';
  const comments = getComments(currentEntryKey);
  comments.push({ author, text, date: new Date().toISOString() });
  saveComments(currentEntryKey, comments);
  input.value = '';
  renderComments(currentEntryKey);
  const sc = document.querySelector('#detail .scroll-container');
  if (sc) setTimeout(()=>{ sc.scrollTop = sc.scrollHeight; }, 60);
}

function deleteComment(i) {
  if (!currentEntryKey) return;
  const comments = getComments(currentEntryKey);
  comments.splice(i, 1);
  saveComments(currentEntryKey, comments);
  renderComments(currentEntryKey);
}

/* ══════════════════════════════════
   KEYBOARD FIX
══════════════════════════════════ */
if (window.visualViewport) {

/* ══════════════════════════════════
   TYPEWRITER
══════════════════════════════════ */
const phrases = [
  "Good morning. Ready to write?",
  "写下此刻，留住今天。",
  "Your thoughts deserve a page.",
  "今天又是新的一天……",
];
let pi=0, ci2=0;
const tw = document.getElementById('typewriter');
function type() {
  const t = phrases[pi];
  if (ci2 < t.length) {
    tw.textContent += t[ci2++];
    setTimeout(type, 85+Math.random()*55);
  } else {
    setTimeout(()=>{
      function erase() {
        if (tw.textContent.length>0) {
          tw.textContent = tw.textContent.slice(0,-1);
          setTimeout(erase, 40);
        } else {
          ci2=0; pi=(pi+1)%phrases.length;
          setTimeout(type, 500);
        }
      }
      erase();
    }, 2500);
  }
}
window.addEventListener('load', type);
window.addEventListener('load', ()=>{ refreshTrashBadge(); });

/* ══════════════════════════════════
   PAGE NAVIGATION
   FIX #4: Pure transition-based — no stamp-enter animation
══════════════════════════════════ */

// Navigation stack to track page history
const navStack = ['home'];

function showPage(id) {
  const el = document.getElementById(id);
  // Force a layout with the slide-up state, then remove it
  // This ensures the transition plays FROM bottom TO center
  el.offsetHeight; // force reflow
  el.classList.remove('slide-up', 'slide-out');
}

function hidePage(id, dir) {
  const el = document.getElementById(id);
  if (dir === 'out') {
    el.classList.add('slide-out');
  } else {
    el.classList.add('slide-up');
  }
  el.style.top = ''; // reset any keyboard offset
}

/* Home → List */
function goList() {
  hidePage('home','out');
  renderList();
  showPage('list');
  navStack.push('list');
  refreshHomeCount();
}

/* List → Home */
function listGoHome() {
  hidePage('list','up');
  const home = document.getElementById('home');
  home.classList.remove('slide-out','slide-up');
  navStack.length = 0;
  navStack.push('home');
}

/* List → Edit (new entry) */
function listGoEdit() {
  resetEditForm();
  showPage('edit');
  navStack.push('edit');
}

/* Edit → List */
function editGoList() {
  hidePage('edit','up');
  resetEditForm();
  renderList();
  if (navStack[navStack.length-1] === 'edit') navStack.pop();
}

/* List → Detail */
let currentEntryIndex = -1;
function openEntry(i) {
  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  const entry = all[i];
  if (!entry) return;
  currentEntryIndex = i;
  currentEntryKey = entry.date;

  document.getElementById('detail-title').textContent = entry.title || '(No title)';
  document.getElementById('detail-ts').innerHTML = fmtDetailTs(entry.date);

  const bodyEl = document.getElementById('detail-body');
  if (entry.photos && entry.photos.length) {
    let html = escapeHtml(entry.body || '').replace(/\n/g, '<br>');
    entry.photos.forEach((src, idx) => {
      html = html.replace(
        new RegExp(`\\[photo:${idx}\\]`, 'g'),
        `<img src="${src}" class="inline-photo" alt="photo ${idx+1}">`
      );
    });
    bodyEl.innerHTML = html;
  } else {
    bodyEl.innerHTML = escapeHtml(entry.body || '').replace(/\n/g, '<br>');
  }

  const grid = document.getElementById('detail-photos');
  grid.innerHTML = '';

  renderComments(entry.date);
  const cinput = document.getElementById('comment-input');
  if (cinput) cinput.value = '';

  showPage('detail');
  navStack.push('detail');
}

/* Detail → List */
function detailGoList() {
  hidePage('detail','up');
  currentEntryIndex = -1;
  currentEntryKey = null;
  if (navStack[navStack.length-1] === 'detail') navStack.pop();
}

/* Delete entry from detail */
function deleteCurrentEntry() {
  if (currentEntryIndex < 0) return;
  moveToTrash(currentEntryIndex);
  hidePage('detail','up');
  currentEntryIndex = -1;
  renderList();
  if (navStack[navStack.length-1] === 'detail') navStack.pop();

/* List → Trash */
function goTrash() {
  renderTrash();
  showPage('trash');
  navStack.push('trash');
}

/* Trash → List */
function trashGoList() {
  hidePage('trash','up');
  renderList();
  if (navStack[navStack.length-1] === 'trash') navStack.pop();
}

/* ══════════════════════════════════
   FIX #5: SWIPE BACK GESTURE
══════════════════════════════════ */
(function initSwipeBack() {
  const appRoot = document.getElementById('app-root');
  const indicator = document.getElementById('swipe-indicator');
  let startX = 0, startY = 0, tracking = false, swiped = false;
  const THRESHOLD = 80;
  const EDGE_ZONE = 35; // px from left edge to start tracking

  appRoot.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    if (touch.clientX > EDGE_ZONE) return; // only start from left edge
    if (navStack.length <= 1) return; // nothing to go back to
    startX = touch.clientX;
    startY = touch.clientY;
    tracking = true;
    swiped = false;
  }, { passive: true });

  appRoot.addEventListener('touchmove', (e) => {
    if (!tracking) return;
    const touch = e.touches[0];
    const dx = touch.clientX - startX;
    const dy = Math.abs(touch.clientY - startY);

    // If vertical scroll is dominant, cancel
    if (dy > dx && dx < 30) {
      tracking = false;
      indicator.classList.remove('visible');
      return;
    }

    if (dx > 20) {
      indicator.classList.add('visible');
      indicator.style.opacity = Math.min(dx / THRESHOLD, 1) * 0.6;
      indicator.style.width = Math.min(dx * 0.4, 30) + 'px';
    }

    if (dx >= THRESHOLD && !swiped) {
      swiped = true;
      tracking = false;
      indicator.classList.remove('visible');
      performSwipeBack();
    }
  }, { passive: true });

  appRoot.addEventListener('touchend', () => {
    tracking = false;
    indicator.classList.remove('visible');
    indicator.style.opacity = '';
    indicator.style.width = '';
  }, { passive: true });

  appRoot.addEventListener('touchcancel', () => {
    tracking = false;
    indicator.classList.remove('visible');
    indicator.style.opacity = '';
    indicator.style.width = '';
  }, { passive: true });
})();

function performSwipeBack() {
  if (navStack.length <= 1) return;
  const current = navStack[navStack.length - 1];

  switch (current) {
    case 'list':
      listGoHome();
      break;
    case 'edit':
      editGoList();
      break;
    case 'detail':
      detailGoList();
      break;
    case 'trash':
      trashGoList();
      break;
  }
}

/* ══════════════════════════════════
   EDIT FORM
══════════════════════════════════ */
function resetEditForm() {
  const d = nowObj();
  document.getElementById('edit-date').textContent = fmt(d);
  document.getElementById('entry-title').value = '';
  const editor = document.getElementById('entry-body');
  editor.innerHTML = '';
  document.getElementById('word-count').textContent = '0 CHARS';
  pendingPhotos = [];
  document.getElementById('photo-strip').innerHTML = '';
  document.getElementById('photo-input').value = '';
}

document.getElementById('edit-date').textContent = fmt(nowObj());

/* ══════════════════════════════════
   FIX #2: PHOTO HANDLING — Insert inline into contenteditable
══════════════════════════════════ */
let pendingPhotos = [];

function handlePhotos(input) {
  const files = [...input.files];
  files.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const src = e.target.result;
      pendingPhotos.push(src);

      // Insert image directly into contenteditable editor
      const editor = document.getElementById('entry-body');
      editor.focus();

      // Create image element
      const img = document.createElement('img');
      img.src = src;
      img.dataset.photoIndex = pendingPhotos.length - 1;
      img.style.display = 'block';
      img.style.maxWidth = '100%';
      img.style.borderRadius = '6px';
      img.style.margin = '8px 0';
      img.style.border = '1px solid rgba(139,0,0,0.12)';

      // Insert at cursor or append
      const sel = window.getSelection();
      if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
        const range = sel.getRangeAt(0);
        range.collapse(false);
        range.insertNode(document.createElement('br'));
        range.collapse(false);
        range.insertNode(img);
        range.collapse(false);
        range.insertNode(document.createElement('br'));
        // Move cursor after
        sel.collapseToEnd();
      } else {
        editor.appendChild(document.createElement('br'));
        editor.appendChild(img);
        editor.appendChild(document.createElement('br'));
      }

      renderPhotoStrip();
      updateCharCount();
    };
    r.readAsDataURL(file);
  });
  input.value = '';
}

function renderPhotoStrip() {
  const strip = document.getElementById('photo-strip');
  strip.innerHTML = '';
  pendingPhotos.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'photo-thumb'; img.src = src;
    const del = document.createElement('button');
    del.className = 'photo-del'; del.textContent = '×';
    del.onclick = () => {
      // Remove from pendingPhotos
      pendingPhotos.splice(i, 1);
      // Remove the corresponding image from the editor
      const editor = document.getElementById('entry-body');
      const imgs = editor.querySelectorAll('img');
      imgs.forEach(edImg => {
        if (edImg.src === src) {
          // Remove surrounding br tags if possible
          const prev = edImg.previousSibling;
          const next = edImg.nextSibling;
          if (next && next.nodeName === 'BR') next.remove();
          if (prev && prev.nodeName === 'BR') prev.remove();
          edImg.remove();
        }
      });
      // Re-index dataset
      const remainingImgs = editor.querySelectorAll('img');
      remainingImgs.forEach((im, idx) => { im.dataset.photoIndex = idx; });
      renderPhotoStrip();
      updateCharCount();
    };
    wrap.appendChild(img); wrap.appendChild(del);
    strip.appendChild(wrap);
  });
}

/* Char count for contenteditable */
function updateCharCount() {
  const editor = document.getElementById('entry-body');
  const text = editor.innerText || '';
  const count = text.replace(/\s/g,'').length;
  document.getElementById('word-count').textContent = count + ' CHARS';
}

document.getElementById('entry-body').addEventListener('input', updateCharCount);

/* ══════════════════════════════════
   FIX #2: SAVE — Extract text + photo markers from contenteditable
══════════════════════════════════ */
function saveEntry() {
  const title = document.getElementById('entry-title').value.trim();
  const editor = document.getElementById('entry-body');

  // Walk the editor DOM and convert to text with [photo:N] markers
  let bodyText = '';
  const photoSrcs = [];

  function walkNodes(node) {
    for (const child of node.childNodes) {
      if (child.nodeType === Node.TEXT_NODE) {
        bodyText += child.textContent;
      } else if (child.nodeName === 'BR') {
        bodyText += '\n';
      } else if (child.nodeName === 'IMG') {
        const src = child.src;
        let idx = photoSrcs.indexOf(src);
        if (idx === -1) {
          idx = photoSrcs.length;
          photoSrcs.push(src);
        }
        bodyText += `[photo:${idx}]`;
      } else if (child.nodeName === 'DIV' || child.nodeName === 'P') {
        // Block elements get newlines
        if (bodyText.length > 0 && !bodyText.endsWith('\n')) bodyText += '\n';
        walkNodes(child);
        if (!bodyText.endsWith('\n')) bodyText += '\n';
      } else {
        walkNodes(child);
      }
    }
  }
  walkNodes(editor);

  bodyText = bodyText.trim();

  if (!title && !bodyText && photoSrcs.length === 0) {
    alert('Write something first ✏️'); return;
  }

  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  all.unshift({
    date: new Date().toISOString(),
    title,
    body: bodyText,
    photos: photoSrcs
  });
  localStorage.setItem('journal_v2', JSON.stringify(all));

  const toast = document.getElementById('toast');
  toast.textContent = 'Saved ✓';
  toast.classList.add('show');
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(editGoList, 300);
  }, 1400);
}

/* ══════════════════════════════════
   TRASH FUNCTIONS
══════════════════════════════════ */
function getTrash() { return JSON.parse(localStorage.getItem('journal_trash')||'[]'); }
function saveTrash(arr) { localStorage.setItem('journal_trash', JSON.stringify(arr)); }

function moveToTrash(i) {
  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  const removed = all.splice(i, 1)[0];
  if (!removed) return;
  removed.deletedAt = new Date().toISOString();
  localStorage.setItem('journal_v2', JSON.stringify(all));
  const trash = getTrash();
  trash.unshift(removed);
  saveTrash(trash);
  refreshHomeCount();
  refreshTrashBadge();

  const toast = document.getElementById('toast');
  toast.textContent = '已移入回收站';
  toast.classList.add('show');
  setTimeout(()=>{ toast.classList.remove('show'); toast.textContent='Saved ✓'; }, 1400);
}

function restoreFromTrash(i) {
  const trash = getTrash();
  const entry = trash.splice(i, 1)[0];
  if (!entry) return;
  delete entry.deletedAt;
  saveTrash(trash);
  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  all.unshift(entry);
  localStorage.setItem('journal_v2', JSON.stringify(all));
  refreshHomeCount();
  refreshTrashBadge();
  renderTrash();
}

function permanentDelete(i) {
  const trash = getTrash();
  trash.splice(i, 1);
  saveTrash(trash);
  refreshTrashBadge();
  renderTrash();
}

function clearAllTrash() {
  const trash = getTrash();
  if (trash.length === 0) return;
  if (!confirm(`确认清空回收站？\n将永久删除 ${trash.length} 条日记，无法恢复。`)) return;
  saveTrash([]);
  refreshTrashBadge();
  renderTrash();
}

function refreshTrashBadge() {
  const trash = getTrash();
  const badge = document.getElementById('trash-badge');
  if (!badge) return;
  if (trash.length > 0) {
    badge.textContent = trash.length > 99 ? '99+' : trash.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function fmtDeletedDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${MONTHS_UP[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')} 删除`;
}

/* ══════════════════════════════════
   TRASH RENDERING
══════════════════════════════════ */
function renderTrash() {
  const trash = getTrash();
  document.getElementById('trash-count').textContent = trash.length;
  const clearBtn = document.getElementById('trash-clear-btn');
  if (clearBtn) clearBtn.disabled = trash.length === 0;

  const container = document.getElementById('trash-list');
  container.innerHTML = '';

  if (trash.length === 0) {
    container.innerHTML = `<div class="trash-empty">回收站是空的<br>删除的日记会出现在这里</div>`;
    return;
  }

  trash.forEach((entry, i) => {
    const card = document.createElement('div');
    card.className = 'trash-card';

    const preview = entry.body
      ? entry.body.replace(/\[photo:\d+\]/g, '').slice(0, 100)
      : (entry.photos && entry.photos.length ? '[Photo entry]' : '(empty)');

    card.innerHTML = `
      <div class="trash-card-inner">
        <div class="trash-card-meta">
          <span>${fmtCardDate(entry.date)}</span>
          <span style="color:rgba(255,100,100,0.6);font-size:10px;">${fmtDeletedDate(entry.deletedAt)}</span>
        </div>
        <div class="trash-card-doc">
          <div class="trash-card-filename">${slugTitle(entry.title)}</div>
          <div class="trash-card-preview">${escapeHtml(preview)}</div>
        </div>
        <div class="trash-card-actions">
          <button class="trash-restore-btn" onclick="restoreFromTrash(${i})">↩ 还原</button>
          <button class="trash-perm-del-btn" onclick="confirmPermDelete(${i})">✕ 永久删除</button>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function confirmPermDelete(i) {
  const trash = getTrash();
  const entry = trash[i];
  const title = entry.title || '(无标题)';
  if (!confirm(`永久删除「${title}」？\n此操作无法撤销。`)) return;
  permanentDelete(i);
}

/* ══════════════════════════════════
   LIST RENDERING
══════════════════════════════════ */
function renderList() {
  const all = JSON.parse(localStorage.getItem('journal_v2')||'[]');
  document.getElementById('list-count').textContent = all.length;
  refreshTrashBadge();
  const container = document.getElementById('entry-list');
  container.innerHTML = '';

  if (all.length===0) {
    container.innerHTML = `<div class="list-empty">NO ENTRIES YET.<br>PRESS WRITE TO BEGIN.</div>`;
    return;
  }

  all.forEach((entry,i)=>{
    const card = document.createElement('div');
    card.className = 'entry-card';
    card.onclick = ()=> openEntry(i);

    const preview = entry.body
      ? entry.body.replace(/\[photo:\d+\]/g, '').slice(0,160)
      : (entry.photos&&entry.photos.length ? '[Photo entry]' : '(empty)');

    let photosHTML = '';
    if (entry.photos&&entry.photos.length) {
      const thumbs = entry.photos.slice(0,4)
        .map(src=>`<img class="card-photo-thumb" src="${src}" alt="">`)
        .join('');
      photosHTML = `<div class="card-photo-row">${thumbs}</div>`;
    }

    card.innerHTML = `
      <button class="card-delete-btn" title="移入回收站">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <div class="entry-card-inner">
        <div class="entry-card-meta">
          <span>${fmtCardDate(entry.date)}</span>
          <span>${fmtCardTime(entry.date)}</span>
        </div>
        <div class="entry-card-doc">
          <div class="entry-card-filename">
            <span>${slugTitle(entry.title)}</span>
            <span style="opacity:.45;font-size:8px">${fmtSize(entry.body)}</span>
          </div>
          <div class="entry-card-preview">${escapeHtml(preview)}</div>
          ${photosHTML}
        </div>
      </div>`;

    card.querySelector('.card-delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      moveToTrash(i);
      renderList();
    });

    container.appendChild(card);
  });
}

  const cinput = document.getElementById('comment-input');

    if (e.key === 'Enter') { e.preventDefault(); postComment(); }
  });

</script>
